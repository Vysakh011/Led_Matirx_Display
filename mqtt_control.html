<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MQTT Control & Sensor Data</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6a11cb" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #6a11cb, #2575fc);
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .container {
      background: white;
      color: black;
      max-width: 90%;
      width: 400px;
      margin: 30px auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
    }
    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }
    #message {
      width: calc(100% - 20px);
      padding: 10px;
      margin-top: 10px;
      border: 2px solid #ccc;
      border-radius: 5px;
      text-align: center;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      font-size: 16px;
    }
    #sendButton {
      background: #3b82f6;
      color: white;
    }
    #sendButton:hover {
      background: #2563eb;
    }
    #clearButton {
      background: #f44336;
      color: white;
    }
    #clearButton:hover {
      background: #d32f2f;
    }
    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }
    table, th, td {
      border: 1px solid #ddd;
    }
    th {
      background: #3b82f6;
      color: white;
      padding: 10px;
    }
    td {
      padding: 10px;
      text-align: center;
      background: #f9f9f9;
    }
    .logout-btn {
      background: red;
      color: white;
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 14px;
      padding: 8px 15px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
    }
    .logout-btn:hover {
      background: darkred;
    }
    #messageHistory {
      margin-top: 20px;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #ddd;
      border-radius: 5px;
      padding: 10px;
      background: #f9f9f9;
      color: black;
    }
    #messageHistory h3 {
      margin-top: 0;
      color: #3b82f6;
    }
    .history-item {
      padding: 5px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }
    .history-item:last-child {
      border-bottom: none;
    }
    #connectionStatus {
      margin-top: 10px;
      padding: 5px;
      border-radius: 5px;
      font-weight: bold;
    }
    .connected {
      background-color: #4CAF50;
      color: white;
    }
    .disconnected {
      background-color: #f44336;
      color: white;
    }

    /* 🔘 Dark mode switch in corner */
    .dark-toggle {
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 999;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 28px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.4s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: 0.4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #6a11cb;
    }

    input:checked + .slider:before {
      transform: translateX(22px);
    }

    /* 🌙 Dark Mode Styles */
    body.dark-mode {
      background: linear-gradient(to right, #000000, #2c3e50);
      color: white;
    }
    body.dark-mode .container {
      background: #1e1e1e;
      color: white;
    }
    body.dark-mode input,
    body.dark-mode textarea {
      background: #2c2c2c;
      color: white;
      border-color: #444;
    }
    body.dark-mode table,
    body.dark-mode th,
    body.dark-mode td {
      background: #2a2a2a;
      color: white;
      border-color: #444;
    }
    body.dark-mode .history-item {
      background: #2e2e2e;
    }
    body.dark-mode .logout-btn {
      background: #8e44ad;
    }

    @media (max-width: 600px) {
      .container {
        max-width: 95%;
        width: auto;
        padding: 15px;
      }
      h1 {
        font-size: 20px;
      }
      button {
        font-size: 14px;
        padding: 8px;
      }
      .logout-btn {
        font-size: 12px;
        padding: 8px 12px;
        bottom: 15px;
        right: 15px;
      }
    }
  </style>
</head>
<body>

  <!-- 🔘 Dark Mode Toggle -->
  <div class="dark-toggle">
    <label class="switch">
      <input type="checkbox" id="darkModeToggle" />
      <span class="slider round"></span>
    </label>
  </div>

  <div class="container">
    <h1>Message via MQTT</h1>
    <div id="connectionStatus" class="disconnected">Disconnected</div>

    <form id="mqttForm">
      <input type="text" id="message" name="message" placeholder="Enter Message" required />
      <button type="submit" id="sendButton">Send Message</button>
    </form>

    <button id="clearButton">CLEAR</button>

    <div id="messageHistory">
      <h3>Message History</h3>
    </div>

    <h2>Sensor Data</h2>
    <table>
      <tr>
        <th>Temperature (°C)</th>
        <th>Pressure (hPa)</th>
        <th>Altitude (m)</th>
        <th>Weather</th>
      </tr>
      <tr>
        <td id="temp">--</td>
        <td id="pressure">--</td>
        <td id="altitude">--</td>
        <td id="weather">--</td>
      </tr>
    </table>
  </div>

  <button id="logoutButton" class="logout-btn">Logout</button>

  <script>
    // 🔐 Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyAlzO4KX4TiF3sT9OdwC4iO1XyNlqMEJKA",
      authDomain: "notice-board-a831b.firebaseapp.com",
      projectId: "notice-board-a831b",
      storageBucket: "notice-board-a831b.appspot.com",
      messagingSenderId: "879522552762",
      appId: "1:879522552762:web:89f0f4811411582c0f9b83",
      measurementId: "G-VRPVZK06P1"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    auth.onAuthStateChanged((user) => {
      if (!user) window.location.href = 'index.html';
    });

    const clientId = "webclient_" + Math.random().toString(16).substr(2, 8);
    const sensorTopic = "ece/sensorDataujndubd";
    const commandTopic = "ece/diFJBNOUIFOVSKJIGWIGJ";

    const client = mqtt.connect("wss://test.mosquitto.org:8081/mqtt", {
      clientId: clientId,
      clean: false,
      reconnectPeriod: 1000
    });

    client.on("connect", () => {
      console.log("Connected");
      client.subscribe(sensorTopic);
      document.getElementById("connectionStatus").textContent = "App connected to MQTT";
      document.getElementById("connectionStatus").className = "connected";
    });

    client.on("message", (topic, message) => {
      if (topic === sensorTopic) {
        try {
          const data = JSON.parse(message.toString());
          document.getElementById("temp").textContent = data.temperature || "--";
          document.getElementById("pressure").textContent = data.pressure || "--";
          document.getElementById("altitude").textContent = data.altitude || "--";
          document.getElementById("weather").textContent = data.weather || "--";
        } catch (e) {
          console.error("Invalid data:", e);
        }
      }
    });

    document.getElementById("mqttForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const message = document.getElementById("message").value.trim();
      if (message && client.connected) {
        client.publish(commandTopic, message);
        addToHistory(message);
        document.getElementById("message").value = "";
      }
    });

    document.getElementById("clearButton").addEventListener("click", () => {
      if (client.connected) {
        client.publish(commandTopic, "CLE@R");
        addToHistory("CLEAR (Display Reset)");
      }
    });

    function addToHistory(msg) {
      const container = document.getElementById("messageHistory");
      const time = new Date().toLocaleTimeString();
      const div = document.createElement("div");
      div.className = "history-item";
      div.innerHTML = `<strong>[${time}]</strong> ${msg}`;
      container.appendChild(div);
    }

    document.getElementById("logoutButton").addEventListener("click", () => {
      auth.signOut().then(() => {
        window.location.href = 'index.html';
      });
    });

    // 🌗 Dark Mode Toggle
    const toggle = document.getElementById("darkModeToggle");
    const prefersDark = localStorage.getItem("darkMode") === "true";
    if (prefersDark) {
      document.body.classList.add("dark-mode");
      toggle.checked = true;
    }

    toggle.addEventListener("change", () => {
      if (toggle.checked) {
        document.body.classList.add("dark-mode");
        localStorage.setItem("darkMode", "true");
      } else {
        document.body.classList.remove("dark-mode");
        localStorage.setItem("darkMode", "false");
      }
    });
  </script>
</body>
</html>
